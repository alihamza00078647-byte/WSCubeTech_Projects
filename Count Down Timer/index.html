<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count Down Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="overlay">
            <div class="text">
                <p style="margin-left: 14rem;">Welcome To 100 Days Of Code</p>
                <p>The Course Will Be Released At <span id="deadline"></span></p>
                <div class="boxes">
                    <div class="box1 all"></div>
                    <div class="box2 all"></div>
                    <div class="box3 all"></div>
                    <div class="box4 all"></div>
                </div>
                <div class="data">
                    <p>Days</p>
                    <p>Hours</p>
                    <p>Mins</p>
                    <p>Second</p>
                </div>
            </div>
        </div>
    </div>
    <script src="count_down_timer.js"></script>
</body>
</html>
